name: Sync Training Data

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests garminconnect garth

      - name: Sync Strava activities + Garmin wellness
        env:
          # Strava
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          # Garmin
          GARMIN_TOKENS:        ${{ secrets.GARMIN_TOKENS }}
          GARMIN_EMAIL:         ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:      ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/sync_garmin.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: sync $(date -u +'%Y-%m-%dT%H:%M')"
          git push
