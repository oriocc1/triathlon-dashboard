name: Garmin Setup (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install garminconnect
        run: pip install garminconnect

      - name: Generate Garmin token and save as secret
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SETUP_TOKEN:     ${{ secrets.SETUP_TOKEN }}
          REPO:            ${{ github.repository }}
        run: python scripts/auth_garmin_ci.py
