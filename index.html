<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Triathlon Dashboard — Ori</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: #30363d; --text: #e6edf3; --muted: #7d8590;
      --accent: #58a6ff; --good: #34d399; --warn: #d29922; --bad: #f85149;
    }
    body { background: var(--bg); color: var(--text); font: 14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height: 100vh; }
    .page { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 18px; }
    h1 { font-size: 28px; margin-bottom: 6px; }
    .muted { color: var(--muted); }
    .row { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 14px; }
    .stat { background: #0f1620; border: 1px solid #21262d; border-radius: 14px; padding: 16px; }
    .stat strong { display: block; font-size: 24px; margin-bottom: 6px; }
    .label { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: .08em; margin-bottom: 8px; }
    .activity { padding: 14px; border: 1px solid #21262d; border-radius: 14px; margin-bottom: 12px; }
    .activity strong { display: block; margin-bottom: 6px; }
    .button { border: none; border-radius: 12px; background: #238636; color: #fff; padding: 12px 18px; cursor: pointer; font-size: 14px; }
    .button:hover { background: #2ea34a; }
    .badge { display: inline-flex; background: rgba(88,166,255,.12); color: var(--accent); padding: 4px 10px; border-radius: 999px; font-size: 11px; align-items: center; }
    .error-panel { border-color: rgba(248,81,73,0.3); color: #ff7b72; }
    .stale-panel { border-color: rgba(210,153,34,0.3); color: var(--warn); }
    .hidden { display: none; }
    @media (max-width: 800px) { .page { padding: 16px; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
      <div>
        <h1>Ori's Training Dashboard</h1>
        <div id="last-updated" class="muted">Loading…</div>
      </div>
      <button class="button" onclick="loadData()">Refresh</button>
    </div>

    <div id="error" class="card error-panel hidden"></div>
    <div id="stale" class="card stale-panel hidden"><span class="badge">⚠️ Activity data may be stale</span></div>
    <div id="content" class="hidden"></div>
    <div id="loading" class="card">Loading data…</div>
  </div>

  <script>
    const REMOTE_JSON = 'https://oribrunner.github.io/triathlon-dashboard/data.json';
    const $ = id => document.getElementById(id);
    const sanitize = text => String(text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const fmtTime = s => {
      if (s == null) return '—';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      return h ? `${h}h ${m}m` : `${m}m`;
    };
    const fmtDist = m => {
      if (m == null) return '—';
      return m >= 1000 ? `${(m / 1000).toFixed(1)}km` : `${Math.round(m)}m`;
    };
    const sportLabel = s => {
      const t = String(s || '').toLowerCase();
      if (/swim/.test(t)) return 'Swim';
      if (/run/.test(t)) return 'Run';
      if (/ride|bike|cycl/.test(t)) return 'Bike';
      return 'Other';
    };

    function buildSummary(data) {
      const activities = Array.isArray(data.activities) ? data.activities : [];
      const wellness = data.wellness || {};
      const fitness = data.fitness || {};
      const today = new Date().toISOString().slice(0, 10);
      const todayWell = wellness[today] || {};
      const counts = activities.reduce((acc, act) => {
        const label = sportLabel(act.sport_type || act.type);
        acc[label] = (acc[label] || 0) + 1;
        return acc;
      }, {});

      const recent = activities.slice(-6).reverse().map(act => {
        const date = sanitize(String(act.start_date_local || '').slice(0, 10) || 'Unknown');
        const name = sanitize(act.name || act.sport_type || act.type || 'Activity');
        return `
          <div class="activity">
            <strong>${name}</strong>
            <div class="muted">${date} · ${fmtTime(act.moving_time)} · ${fmtDist(act.distance)}</div>
            <div class="muted">TSS ${act.icu_training_load || 0} · ${sanitize(sportLabel(act.sport_type || act.type))}</div>
          </div>`;
      }).join('') || '<div class="muted">No recent activities.</div>';

      return `
        <div class="card row">
          <div class="stat"><span class="label">Activities</span><strong>${activities.length}</strong></div>
          <div class="stat"><span class="label">CTL</span><strong>${fitness.ctl ?? 'N/A'}</strong></div>
          <div class="stat"><span class="label">ATL</span><strong>${fitness.atl ?? 'N/A'}</strong></div>
          <div class="stat"><span class="label">TSB</span><strong>${fitness.tsb ?? 'N/A'}</strong></div>
        </div>
        <div class="card row">
          <div class="stat"><span class="label">Bike</span><strong>${counts.Bike || 0}</strong></div>
          <div class="stat"><span class="label">Run</span><strong>${counts.Run || 0}</strong></div>
          <div class="stat"><span class="label">Swim</span><strong>${counts.Swim || 0}</strong></div>
          <div class="stat"><span class="label">Other</span><strong>${counts.Other || 0}</strong></div>
        </div>
        <div class="card row">
          <div class="stat"><span class="label">HRV today</span><strong>${todayWell.hrv ?? 'N/A'}</strong></div>
          <div class="stat"><span class="label">Resting HR</span><strong>${todayWell.resting_hr ?? 'N/A'}</strong></div>
          <div class="stat"><span class="label">Sleep</span><strong>${todayWell.sleep_secs != null ? (todayWell.sleep_secs / 3600).toFixed(1) + 'h' : 'N/A'}</strong></div>
          <div class="stat"><span class="label">Battery</span><strong>${todayWell.body_battery ?? 'N/A'}</strong></div>
        </div>
        <div class="card">
          <div class="label">Recent activities</div>
          ${recent}
        </div>`;
    }

    async function fetchJson(url) {
      const res = await fetch(url + '?t=' + Date.now());
      if (!res.ok) throw new Error(`Unable to load ${url} (${res.status})`);
      return res.json();
    }

    async function loadData() {
      $('error').classList.add('hidden');
      $('stale').classList.add('hidden');
      $('content').classList.add('hidden');
      $('loading').classList.remove('hidden');
      $('last-updated').textContent = 'Loading…';

      try {
        let data = null;
        let source = './data.json';

        try {
          data = await fetchJson('./data.json');
        } catch (err) {
          data = null;
        }

        const noActivities = !data || !Array.isArray(data.activities) || data.activities.length === 0;
        if (noActivities) {
          source = REMOTE_JSON;
          data = await fetchJson(REMOTE_JSON);
        }

        $('content').innerHTML = buildSummary(data);
        $('content').classList.remove('hidden');
        $('loading').classList.add('hidden');

        const synced = data.synced_at ? new Date(data.synced_at).toLocaleString('en-GB') : 'never';
        $('last-updated').textContent = `Last synced: ${synced}` + (source !== './data.json' ? ' (loaded published data)' : '');

        const latest = (data.activities || []).map(a => String(a.start_date_local || '').slice(0, 10)).filter(Boolean).sort().pop();
        const today = new Date().toISOString().slice(0, 10);
        if (latest && latest !== today) {
          $('stale').classList.remove('hidden');
        }
      } catch (err) {
        $('error').textContent = `Error: ${sanitize(err.message)}`;
        $('error').classList.remove('hidden');
        $('loading').classList.add('hidden');
        $('last-updated').textContent = 'Unable to load dashboard';
      }
    }

    loadData();
  </script>
</body>
</html>
